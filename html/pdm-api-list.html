.filter-btn.active{background:#1677ff;color:#fff;border-color:#1677ff}

        {m:'POST',  path:'/pdm/temp-req/create',                            summary:'創建臨時需求',               params:'body: TempReqSaveReqVO'},
        {m:'PUT',   path:'/pdm/temp-req/update',                            summary:'更新臨時需求',               params:'body: TempReqSaveReqVO'},
        {m:'DELETE',path:'/pdm/temp-req/delete',                            summary:'刪除臨時需求',               params:'id'},
        {m:'GET',   path:'/pdm/temp-req/export-excel',                      summary:'匯出臨時需求 Excel',         params:'pageNo, pageSize'},
        {m:'GET',   path:'/pdm/temp-req/temp-req-detail/list-by-parent-id', summary:'獲得臨時需求詳情列表',        params:'parentId'},
      ]
    },
  ]
},
];

// ─────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────
let activeMethod = 'ALL';
let activeOA = 'ALL'; // 'ALL' | 'done' | 'todo'

// ─────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────
function buildDOM(){
  const container = document.getElementById('groups-container');
  let totalApis=0, totalGet=0, totalPost=0, totalPut=0, totalDel=0, totalOA=0;

  groups.forEach((g, gi)=>{
    let groupTotal=0, groupOA=0;
    g.controllers.forEach(c=>{
      c.apis.forEach(a=>{
        const key = `${a.m} ${a.path}`;
        a._oa = OA_DONE.has(key);
        if(a._oa){ groupOA++; totalOA++; }
        groupTotal++;
        totalApis++;
        if(a.m==='GET')    totalGet++;
        else if(a.m==='POST')   totalPost++;
        else if(a.m==='PUT')    totalPut++;
        else if(a.m==='DELETE') totalDel++;
      });
    });

    const groupDiv = document.createElement('div');
    groupDiv.className = 'group';
    groupDiv.innerHTML = `
      <div class="group-header" style="--gc:${g.color}" onclick="toggleGroup(${gi})">
        <span class="group-title">${g.name}</span>
        <span class="group-count" style="background:${g.color}">${groupTotal} APIs</span>
        <span class="group-oa">OA ${groupOA}/${groupTotal}</span>
        <span class="group-toggle" id="gt-${gi}">▲</span>
      </div>
      <div class="group-body" id="gb-${gi}">
        ${g.controllers.map(c=>{
          const done = c.apis.filter(a=>a._oa).length;
          const total = c.apis.length;
          const badgeCls = done===0?'none':done===total?'full':'partial';
          const badgeTxt = done===0?'未實作':done===total?'全部完成':`${done}/${total} 已實作`;
          return `
          <div class="ctrl-block">
            <div class="ctrl-header">
              <span class="ctrl-name">${c.name}</span>
              <span class="ctrl-prefix">${c.prefix}</span>
              <span class="ctrl-tag">${c.tag}</span>
              <span class="ctrl-oa-badge ${badgeCls}">${badgeTxt}</span>
            </div>
            <div class="tbl-head">
              <span>Method</span><span>Endpoint</span><span>說明</span><span>參數</span>
              <span>OA 已實作</span>
            </div>
            ${c.apis.map((a,ai)=>{
              const key = `${a.m} ${a.path}`;
              const rowId = `row-${gi}-${c.name}-${ai}`;
              return `<div class="api-row${a._oa?' oa-done':''}" id="${rowId}" data-method="${a.m}" data-oa="${a._oa?'done':'todo'}" data-search="${a.path} ${a.summary} ${c.tag} ${g.name}">
                <div class="api-cell"><span class="badge ${a.m.toLowerCase()}">${a.m}</span></div>
                <div class="api-cell col-ep">
                  <div class="ep">${a.path.replace(/\{(\w+)\}/g,'<em style="color:#d46b08">{$1}</em>')}</div>
                </div>
                <div class="api-cell"><div class="ep-summary">${a.summary}</div></div>
                <div class="params-cell">${formatParams(a.params)}</div>
                <div class="api-cell">
                  <input type="checkbox" class="oa-check" ${a._oa?'checked':''} title="${a._oa?'OA 已實作':'OA 未實作'}" onchange="onCheckChange(this,'${rowId}')"/>
                </div>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(groupDiv);
  });

  // Update summary cards
  document.getElementById('s-all').textContent     = totalApis;
  document.getElementById('s-get').textContent     = totalGet;
  document.getElementById('s-post').textContent    = totalPost;
  document.getElementById('s-put').textContent     = totalPut;
  document.getElementById('s-del').textContent     = totalDel;
  document.getElementById('s-oa-done').textContent = totalOA;
  document.getElementById('s-oa-todo').textContent = totalApis - totalOA;
  document.getElementById('total-count').textContent = totalApis;

  // Progress bar
  const pct = Math.round(totalOA/totalApis*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = `${totalOA} / ${totalApis}`;
  document.getElementById('prog-pct').textContent  = pct+'%';

  updateCount();
}

function formatParams(p){
  if(!p||p==='—') return '<span style="color:#ccc">—</span>';
  return p.split(',').map(s=>{
    s=s.trim(); if(!s||s==='—') return '';
    if(s.startsWith('body:')) return `<span class="param-body">${s}</span>`;
    if(s.startsWith('pathVar:')) return `<span class="param-body" style="background:#f9f0ff;color:#531dab">${s}</span>`;
    return `<span class="param-tag">${s}</span>`;
  }).join('');
}

function toggleGroup(gi){
  const body=document.getElementById(`gb-${gi}`);
  const icon=document.getElementById(`gt-${gi}`);
  const hidden=body.style.display==='none';
  body.style.display=hidden?'':'none';
  icon.textContent=hidden?'▲':'▼';
}

function onCheckChange(cb, rowId){
  const row = document.getElementById(rowId);
  if(cb.checked){
    row.classList.add('oa-done');
    row.dataset.oa='done';
    cb.title='OA 已實作';
  } else {
    row.classList.remove('oa-done');
    row.dataset.oa='todo';
    cb.title='OA 未實作';
  }
  // recalc counts
  const done = document.querySelectorAll('.api-row:not(.hidden) .oa-check:checked').length;
  const total= document.querySelectorAll('.api-row').length;
  const pct  = Math.round(done/total*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done} / ${total}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('s-oa-done').textContent=done;
  document.getElementById('s-oa-todo').textContent=total-done;
  doFilter();
}

function doFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.api-row').forEach(row=>{
    const mOk = activeMethod==='ALL' || row.dataset.method===activeMethod;
    const oaOk= activeOA==='ALL' || row.dataset.oa===activeOA;
    const sOk = !q || row.dataset.search.toLowerCase().includes(q);
    row.classList.toggle('hidden', !(mOk && oaOk && sOk));
  });
  updateCount();
}

function setMethod(m){
  activeMethod=m;
  document.querySelectorAll('.filter-group:first-of-type .filter-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===m||(m==='ALL'&&b.textContent==='全部'));
  });
  doFilter();
}

function setOA(v){
  activeOA=v;
  document.querySelectorAll('.filter-btn.oa-yes,.filter-btn.oa-no').forEach(b=>{
    const bv = b.onclick.toString().includes("'done'")?'done':b.onclick.toString().includes("'todo'")?'todo':'ALL';
    b.classList.toggle('active', bv===v||(v==='ALL'&&b.textContent==='OA 全部'));
  });
  doFilter();
}

function updateCount(){
  document.getElementById('visible-count').textContent=
    document.querySelectorAll('.api-row:not(.hidden)').length;
}

buildDOM();
</script>
</body>
</html>
