.c-fe .n{color:#1677ff}.c-oa .n{color:#237804}.c-miss .n{color:#cf1322}.c-extra .n{color:#d46b08}

.toolbar{background:#fff;border-bottom:1px solid #e8eaf0;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.06)}

.filter-btn.active{background:#1677ff;color:#fff;border-color:#1677ff}
.filter-btn.miss.active{background:#cf1322;border-color:#cf1322}
.filter-btn.ok.active{background:#237804;border-color:#237804}
.stat{margin-left:auto;font-size:12px;color:#888;white-space:nowrap}

.page-block{border-bottom:1px solid #f0f2f5}

.page-header{padding:7px 16px;background:#f9fafc;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f2f5;flex-wrap:wrap}
.page-name{font-size:12px;font-weight:700;color:#0a1628}

.legend{background:#fff;border-top:1px solid #eee;padding:10px 28px;display:flex;gap:20px;font-size:12px;color:#888;flex-wrap:wrap}

</div>

<div class="toolbar">

</div>

<div id="container"></div>

// ─────────────────────────────────────────────────
// OA 有實作但前端未呼叫的 API
// ─────────────────────────────────────────────────
const feCalledSet = new Set();
sections.forEach(sec => sec.pages.forEach(pg => pg.apis.forEach(a => {
  let ep = a.ep.replace(/\/\{[^}]+\}/g,'/{id}');
  feCalledSet.add(a.m + ' ' + ep);
  // alias: DOWNLOAD → GET
  if(a.m === 'DOWNLOAD') feCalledSet.add('GET ' + ep);
})));

const oaOnlyApis = [...OA_DONE].filter(key => !feCalledSet.has(key));

// ─────────────────────────────────────────────────
// 決定每個 API 的 OA 狀態
// ─────────────────────────────────────────────────
function getStatus(m, ep) {
  if(m === 'DOWNLOAD') m = 'GET';
  const bpmList = [
    '/pdm/ingredient/todo-page','/pdm/packing-materials/todo-page',
    '/pdm/recipe/todo-page','/pdm/demand-forecast/todo-page',
    '/pdm/temp-req/todo-page','/pdm/demand-forecast/update-process-status',
  ];
  if(bpmList.some(b => ep.includes(b))) return 'bpm';
  let key = m + ' ' + ep;
  // handle {id} pattern
  const keyNorm = key.replace(/\/\d+([/?]|$)/,'/{id}$1');
  if(OA_DONE.has(key) || OA_DONE.has(keyNorm)) return 'done';
  // special: delete-list → check batch-delete
  if(ep.includes('delete-list')) {
    const altKey = key.replace('delete-list','batch-delete');
    if(OA_DONE.has(altKey)) return 'mismatch';
  }
  return 'miss';
}

// ─────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────
const container = document.getElementById('container');
let totalFe=0, totalDone=0, totalMiss=0;

sections.forEach(sec => {
  let secDone=0, secTotal=0;
  sec.pages.forEach(pg => {
    pg.apis.forEach(a => {
      a._status = getStatus(a.m, a.ep);
      if(a._status !== 'bpm') { secTotal++; totalFe++; }
      if(a._status === 'done' || a._status === 'mismatch') { secDone++; totalDone++; }
      if(a._status === 'miss' || a._status === 'mismatch') totalMiss++;
    });
  });

  const secEl = document.createElement('div');
  secEl.className = 'section';
  secEl.style.setProperty('--gc', sec.color);

  let pagesHtml = '';
  sec.pages.forEach(pg => {
    let pgDone=0, pgTotal=0;
    pg.apis.forEach(a => {
      if(a._status !== 'bpm') pgTotal++;
      if(a._status === 'done' || a._status === 'mismatch') pgDone++;
    });
    const pgBadgeClass = pgTotal===0 ? 'bpm' : pgDone===pgTotal ? 'full' : pgDone>0 ? 'partial' : 'none';
    const pgBadgeText = pgTotal===0 ? 'BPM 僅' : pgDone+'/'+pgTotal+' OA';

    let rowsHtml = pg.apis.map(a => {
      const sc = a._status === 'done' ? 'oa-done' : a._status === 'miss' ? 'oa-miss' : a._status === 'mismatch' ? 'oa-miss' : 'oa-bpm';
      let statusHtml;
      if(a._status === 'done')      statusHtml = '<span class="status-badge s-done">✅ 已實作</span>';
      else if(a._status === 'mismatch') statusHtml = '<span class="status-badge s-miss">⚠️ 路由名不同</span>';
      else if(a._status === 'miss') statusHtml = '<span class="status-badge s-miss">❌ 缺少</span>';
      else                          statusHtml = '<span class="status-badge s-bpm">🔄 BPM</span>';
      const methodClass = a.m === 'DOWNLOAD' ? 'DOWNLOAD' : a.m;
      return `<div class="api-row ${sc}" data-ep="${a.m} ${a.ep}" data-status="${a._status}">
        <div class="api-cell"><span class="badge ${methodClass}">${a.m}</span></div>
        <div class="api-cell"><div class="ep">${a.ep}</div></div>
        <div class="api-cell"><div class="ep-note">${a.note}</div></div>
        <div class="api-cell">${statusHtml}</div>
      </div>`;
    }).join('');

    pagesHtml += `<div class="page-block">
      <div class="page-header">
        <span class="page-name">${pg.name}</span>
        <span class="page-path">${pg.path}</span>
        <span style="font-size:11px;color:#aaa;margin-left:4px">${pg.file}</span>
        <span class="page-badge ${pgBadgeClass}" style="margin-left:auto">${pgBadgeText}</span>
      </div>
      <div class="tbl-head"><span>Method</span><span>Endpoint</span><span>說明</span><span style="text-align:center">OA 狀態</span></div>
      ${rowsHtml}
    </div>`;
  });

  const pct = secTotal>0 ? Math.round(secDone/secTotal*100) : 100;
  secEl.innerHTML = `
    <div class="section-header" onclick="toggleSection(this)">
      <span class="section-title">${sec.name}</span>
      <span class="section-badge">${secDone}/${secTotal} OA 實作</span>
      <span class="section-toggle">▼</span>
    </div>
    <div class="section-body">${pagesHtml}</div>`;
  container.appendChild(secEl);
});

// OA only section
const oaOnlyEl = document.createElement('div');
oaOnlyEl.className = 'section';
oaOnlyEl.style.setProperty('--gc','#8c8c8c');
let oaOnlyRows = oaOnlyApis.map(key => {
  const [m, ...rest] = key.split(' ');
  const ep = rest.join(' ');

    <div class="api-cell"><div class="ep">${ep}</div></div>
    <div class="api-cell"><div class="ep-note">OA 已實作，但前端 API 檔案未呼叫</div></div>
    <div class="api-cell"><span class="status-badge" style="background:#f5f5f5;color:#888;border:1px solid #d9d9d9">➖ 前端未呼叫</span></div>
  </div>`;
}).join('');
oaOnlyEl.innerHTML = `
  <div class="section-header" onclick="toggleSection(this)">
    <span class="section-title">OA 已實作 但前端未呼叫</span>
    <span class="section-badge">${oaOnlyApis.length} 個</span>
    <span class="section-toggle">▼</span>
  </div>
  <div class="section-body">
    <div class="page-block">
      <div class="page-header"><span class="page-name">以下 API 已在 OA routes/erp.php 實作，但前端 API 檔案中未找到對應呼叫</span></div>
      <div class="tbl-head"><span>Method</span><span>Endpoint</span><span>說明</span><span style="text-align:center">狀態</span></div>
      ${oaOnlyRows}
    </div>
  </div>`;
container.appendChild(oaOnlyEl);

// Stats
document.getElementById('s-fe').textContent = totalFe;
document.getElementById('s-oa').textContent = totalDone;
document.getElementById('s-miss').textContent = totalMiss;
document.getElementById('s-extra').textContent = oaOnlyApis.length;
document.getElementById('t-count').textContent = totalFe + oaOnlyApis.length;

const pct = totalFe > 0 ? Math.round(totalDone/totalFe*100) : 0;
document.getElementById('prog-text').textContent = totalDone+' / '+totalFe;
document.getElementById('prog-fill').style.width = pct+'%';
document.getElementById('prog-pct').textContent = pct+'%';
doFilter();

// ─────────────────────────────────────────────────
// Filter / Search
// ─────────────────────────────────────────────────
let curFilter = 'ALL';
function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doFilter();
}
function toggleSection(hdr) {
  const body = hdr.nextElementSibling;
  const toggle = hdr.querySelector('.section-toggle');
  body.style.display = body.style.display === 'none' ? '' : 'none';
  toggle.textContent = body.style.display === 'none' ? '▶' : '▼';
}
function doFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  let vis = 0;
  document.querySelectorAll('.api-row').forEach(row => {
    const ep = (row.dataset.ep || '').toLowerCase();
    const status = row.dataset.status || '';
    const matchQ = !q || ep.includes(q);
    const matchF = curFilter === 'ALL' ||
                   (curFilter === 'MISS' && (status === 'miss' || status === 'mismatch')) ||
                   (curFilter === 'DONE' && (status === 'done' || status === 'oa-only'));
    if(matchQ && matchF){ row.classList.remove('hidden'); vis++; }
    else row.classList.add('hidden');
  });
  document.getElementById('v-count').textContent = vis;
}
</script>
